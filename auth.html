<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Вход / Регистрация</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{width:100%;min-height:100vh;background-color:#808080;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}.auth-container{width:100%;max-width:400px;padding:20px}.form-group{margin-bottom:15px}label{display:block;margin-bottom:5px;color:#333;font-size:14px}input{width:100%;padding:10px;border:1px solid #666;background:white;font-size:16px;outline:none}input:focus{border-color:#000}button{width:100%;padding:10px;background:#404040;color:white;border:1px solid #333;font-size:16px;cursor:pointer;margin-bottom:10px}button:hover{background:#505050}.toggle-btn{background:transparent;color:#333;border:1px solid #666}.toggle-btn:hover{background:#e0e0e0}.message{margin-top:15px;padding:10px;border:1px solid #999;background:#f0f0f0;color:#333;font-size:14px;display:none}.message.error{border-color:#cc0000;background:#ffeeee;color:#cc0000}
</style></head><body><div class="auth-container"><div class="form-group"><label for="username">Имя пользователя</label><input type="text" id="username" placeholder="username"></div><div class="form-group"><label for="password">Пароль</label><input type="password" id="password" placeholder="••••••••"></div><button id="registerBtn">Зарегистрироваться</button><button id="loginBtn" class="toggle-btn">Войти</button><div id="message" class="message"></div></div><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script><script>
const firebaseConfig={apiKey:"AIzaSyDTx2Y9ctiWp26YeMmAHAxDZd_gVI_ZMdw",authDomain:"kcalls.firebaseapp.com",databaseURL:"https://kcalls-default-rtdb.firebaseio.com",projectId:"kcalls",storageBucket:"kcalls.firebasestorage.app",messagingSenderId:"990117089104",appId:"1:990117089104:web:278a42c037e975ebb76655"};
firebase.initializeApp(firebaseConfig);const database=firebase.database();const u=document.getElementById('username'),p=document.getElementById('password'),r=document.getElementById('registerBtn'),l=document.getElementById('loginBtn'),m=document.getElementById('message');function s(t,e){m.textContent=t;m.style.display='block';m.className='message '+(e?'success':'error')}function c(){u.value='';p.value=''}r.addEventListener('click',()=>{const a=u.value.trim(),b=p.value.trim();if(!a||!b)return s('Заполните все поля');if(b.length<6)return s('Пароль должен быть не менее 6 символов');database.ref('users').orderByChild('username').equalTo(a).once('value').then(e=>{if(e.exists())throw new Error('Пользователь с таким именем уже существует');return database.ref('users').push().set({username:a,password:btoa(b),createdAt:new Date().toISOString()})}).then(()=>{c();localStorage.setItem('bankiName',a);window.location.href='https://furrygram.ru'}).catch(e=>s('Ошибка: '+e.message))});l.addEventListener('click',()=>{const a=u.value.trim(),b=p.value.trim();if(!a||!b)return s('Введите имя пользователя и пароль');database.ref('users').orderByChild('username').equalTo(a).once('value').then(e=>{if(!e.exists())throw new Error('Пользователь не найден');let d;e.forEach(e=>d=e.val());if(d.password!==btoa(b))throw new Error('Неверный пароль');c();localStorage.setItem('bankiName',a);window.location.href='https://furrygram.ru'}).catch(e=>s('Ошибка: '+e.message))});
</script></body></html>
